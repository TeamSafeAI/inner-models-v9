<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Brain Activity Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #ccc; font-family: monospace; overflow: hidden; }
#canvas { position: absolute; top: 0; left: 0; }
#hud {
    position: absolute; top: 10px; left: 10px; z-index: 10;
    background: rgba(0,0,0,0.7); padding: 12px; border-radius: 6px;
    font-size: 13px; line-height: 1.6; min-width: 220px;
}
#hud .label { color: #888; }
#hud .value { color: #eee; font-weight: bold; }
#types {
    position: absolute; top: 10px; right: 10px; z-index: 10;
    background: rgba(0,0,0,0.7); padding: 12px; border-radius: 6px;
    font-size: 12px; line-height: 1.8; min-width: 180px;
}
.type-bar {
    display: inline-block; height: 8px; border-radius: 2px;
    margin-right: 4px; vertical-align: middle; transition: width 0.1s;
}
#io-panel {
    position: absolute; top: 230px; left: 10px; z-index: 10;
    background: rgba(0,0,0,0.7); padding: 12px; border-radius: 6px;
    font-size: 12px; min-width: 210px;
}
#io-panel button {
    background: #333; color: #ccc; border: 1px solid #555; padding: 3px 10px;
    border-radius: 3px; cursor: pointer; font-family: monospace; font-size: 11px;
}
#io-panel button:hover { background: #444; }
#io-panel button.active { background: #2a5; color: #fff; border-color: #3b6; }
.level-bar {
    display: inline-block; width: 80px; height: 8px; background: #222;
    border-radius: 2px; vertical-align: middle; margin-left: 6px;
    overflow: hidden;
}
.level-fill {
    height: 100%; border-radius: 2px; transition: width 0.05s;
}
#cam-preview {
    display: none; margin-top: 4px; border: 1px solid #333;
    image-rendering: pixelated; width: 64px; height: 64px;
}
#motor-panel {
    position: absolute; top: 280px; right: 10px; z-index: 10;
    background: rgba(0,0,0,0.7); padding: 12px; border-radius: 6px;
    font-size: 12px; min-width: 180px;
}
#controls {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    z-index: 10; background: rgba(0,0,0,0.7); padding: 8px 16px;
    border-radius: 6px; font-size: 12px;
}
#controls button {
    background: #333; color: #ccc; border: 1px solid #555; padding: 4px 12px;
    margin: 0 4px; border-radius: 3px; cursor: pointer; font-family: monospace;
}
#controls button:hover { background: #444; }
#controls input[type=range] { vertical-align: middle; width: 100px; }
#eeg {
    position: absolute; bottom: 60px; left: 10px; right: 10px; z-index: 10;
    background: rgba(0,0,0,0.5); border-radius: 6px; height: 120px;
}
#eeg canvas { width: 100%; height: 100%; }
#status {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 20; font-size: 18px; color: #888;
}
</style>
</head>
<body>
<div id="status">Connecting...</div>
<div id="hud">
    <div><span class="label">Tick: </span><span class="value" id="tick">0</span></div>
    <div><span class="label">Neurons: </span><span class="value" id="n-neurons">-</span></div>
    <div><span class="label">Synapses: </span><span class="value" id="n-synapses">-</span></div>
    <div><span class="label">Firing: </span><span class="value" id="n-fired">0</span></div>
    <div><span class="label">Tonic: </span><span class="value" id="tonic">2.8</span></div>
    <div><span class="label">Speed: </span><span class="value" id="speed">1.0</span></div>
</div>
<div id="types"></div>

<div id="io-panel">
    <div style="font-weight:bold;margin-bottom:6px">I/O Electrodes</div>
    <div style="margin-bottom:4px">
        <button id="mic-btn" onclick="toggleMic()">Mic OFF</button>
        <div class="level-bar"><div class="level-fill" id="mic-fill" style="width:0%;background:#2a5"></div></div>
        <span style="color:#555;font-size:10px" id="mic-info">16 bands x 8 pop</span>
    </div>
    <div style="margin-bottom:4px">
        <button id="cam-btn" onclick="toggleCam()">Cam OFF</button>
        <div class="level-bar"><div class="level-fill" id="cam-fill" style="width:0%;background:#47a"></div></div>
        <span style="color:#555;font-size:10px">8x8 px x 4 pop</span>
    </div>
    <canvas id="cam-preview"></canvas>
    <div style="margin-top:6px;color:#666;font-size:10px">
        Shift+Click = Touch probe
    </div>
    <div style="margin-top:2px">
        <span style="color:#888">Probe mA:</span>
        <input type="range" id="touch-str" min="1" max="30" step="1" value="15"
               style="width:70px;vertical-align:middle">
        <span id="touch-val" style="color:#888">15</span>
    </div>
</div>

<div id="motor-panel">
    <div style="font-weight:bold;margin-bottom:4px">Motor Output</div>
    <canvas id="motor-canvas" width="160" height="40"></canvas>
    <div style="color:#555;font-size:10px;margin-top:2px">8 decoded channels (128 neurons)</div>
</div>

<div id="controls">
    <button onclick="send({action:'pause'})">Pause/Resume</button>
    <span style="color:#888">Speed:</span>
    <input type="range" id="speed-slider" min="0.1" max="10" step="0.1" value="1.0"
           oninput="send({action:'speed',value:parseFloat(this.value)})">
    <span style="color:#888">Tonic:</span>
    <input type="range" id="tonic-slider" min="0" max="5" step="0.1" value="2.8"
           oninput="send({action:'tonic',value:parseFloat(this.value)})">
</div>
<div id="eeg"><canvas id="eeg-canvas"></canvas></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// --- State ---
let ws = null;
let neurons = [];
let nNeurons = 0;
let typeColors = {};
let typeCounts = {};
let electrodes = {};
let scene, camera, renderer, controls;
let neuronPoints = null;
let neuronColors = null;
let neuronSizes = null;
let baseColors = null;
let baseSizeArr = null;
let glowDecay = null;
let eegHistory = {};
const EEG_LEN = 300;
const GLOW_DECAY = 0.85;
const GLOW_BOOST = 1.0;
const BASE_SIZE = 2.0;
const GLOW_SIZE = 6.0;
const ELECTRODE_SIZE = 3.0;

// I/O state
let micActive = false;
let camActive = false;
let audioCtx = null;
let analyser = null;
let micStream = null;
let camStream = null;
let videoEl = null;
let camSmall = null;
let camSmallCtx = null;

// Touch strength display
document.addEventListener('DOMContentLoaded', () => {
    const ts = document.getElementById('touch-str');
    if (ts) ts.oninput = () => {
        document.getElementById('touch-val').textContent = ts.value;
    };
});

// --- WebSocket ---
function connect() {
    const port = location.port ? parseInt(location.port) + 1 : 8891;
    ws = new WebSocket('ws://localhost:' + port);
    ws.onopen = () => {
        document.getElementById('status').style.display = 'none';
    };
    ws.onclose = () => {
        document.getElementById('status').textContent = 'Disconnected. Reconnecting...';
        document.getElementById('status').style.display = 'block';
        setTimeout(connect, 2000);
    };
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'config') onConfig(data);
        else if (data.type === 'frame') onFrame(data);
    };
}

function send(obj) {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
}

// --- Microphone ---
const AUDIO_CHANNELS = 16;  // population encoding channels

async function toggleMic() {
    const btn = document.getElementById('mic-btn');
    if (!micActive) {
        try {
            audioCtx = new AudioContext();
            micStream = await navigator.mediaDevices.getUserMedia({audio: true});
            const source = audioCtx.createMediaStreamSource(micStream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;  // 128 frequency bins, downsample to 16 channels
            source.connect(analyser);
            micActive = true;
            btn.textContent = 'Mic ON';
            btn.classList.add('active');
        } catch(e) {
            console.error('Mic error:', e);
        }
    } else {
        micActive = false;
        send({action: 'audio', fft: new Array(AUDIO_CHANNELS).fill(0)});
        if (micStream) micStream.getTracks().forEach(t => t.stop());
        if (audioCtx) audioCtx.close();
        analyser = null;
        btn.textContent = 'Mic OFF';
        btn.classList.remove('active');
        document.getElementById('mic-fill').style.width = '0%';
    }
}

function getAudioFFT() {
    if (!analyser) return null;
    const raw = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(raw);
    // Downsample to AUDIO_CHANNELS by averaging bins into bands
    const binsPerChannel = Math.floor(raw.length / AUDIO_CHANNELS);
    const fft = [];
    let peak = 0;
    for (let ch = 0; ch < AUDIO_CHANNELS; ch++) {
        let sum = 0;
        for (let b = 0; b < binsPerChannel; b++) {
            sum += raw[ch * binsPerChannel + b];
        }
        const v = (sum / binsPerChannel) / 255;
        fft.push(v);
        if (v > peak) peak = v;
    }
    document.getElementById('mic-fill').style.width = Math.round(peak * 100) + '%';
    return fft;
}

// --- Camera ---
const VISUAL_SIZE = 8;  // 8x8 pixel grid
const VISUAL_CHANNELS = VISUAL_SIZE * VISUAL_SIZE;  // 64

async function toggleCam() {
    const btn = document.getElementById('cam-btn');
    const preview = document.getElementById('cam-preview');
    if (!camActive) {
        try {
            camStream = await navigator.mediaDevices.getUserMedia({video: true});
            videoEl = document.createElement('video');
            videoEl.srcObject = camStream;
            videoEl.play();
            camSmall = document.createElement('canvas');
            camSmall.width = VISUAL_SIZE;
            camSmall.height = VISUAL_SIZE;
            camSmallCtx = camSmall.getContext('2d');
            camActive = true;
            btn.textContent = 'Cam ON';
            btn.classList.add('active');
            preview.style.display = 'block';
        } catch(e) {
            console.error('Camera error:', e);
        }
    } else {
        camActive = false;
        send({action: 'visual', pixels: new Array(VISUAL_CHANNELS).fill(0)});
        if (camStream) camStream.getTracks().forEach(t => t.stop());
        videoEl = null;
        btn.textContent = 'Cam OFF';
        btn.classList.remove('active');
        document.getElementById('cam-preview').style.display = 'none';
        document.getElementById('cam-fill').style.width = '0%';
    }
}

function getVisualPixels() {
    if (!camSmallCtx || !videoEl || videoEl.readyState < 2) return null;
    camSmallCtx.drawImage(videoEl, 0, 0, VISUAL_SIZE, VISUAL_SIZE);
    const imgData = camSmallCtx.getImageData(0, 0, VISUAL_SIZE, VISUAL_SIZE);
    const pixels = [];
    let total = 0;
    for (let i = 0; i < VISUAL_CHANNELS; i++) {
        const r = imgData.data[i * 4];
        const g = imgData.data[i * 4 + 1];
        const b = imgData.data[i * 4 + 2];
        const gray = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
        pixels.push(gray);
        total += gray;
    }
    const preview = document.getElementById('cam-preview');
    const pCtx = preview.getContext('2d');
    preview.width = 64;
    preview.height = 64;
    pCtx.drawImage(videoEl, 0, 0, 64, 64);
    document.getElementById('cam-fill').style.width = Math.round((total / VISUAL_CHANNELS) * 100) + '%';
    return pixels;
}

// --- I/O streaming at ~30fps ---
setInterval(() => {
    if (micActive) {
        const fft = getAudioFFT();
        if (fft) send({action: 'audio', fft: fft});
    }
    if (camActive) {
        const px = getVisualPixels();
        if (px) send({action: 'visual', pixels: px});
    }
}, 33);

// --- Touch probe (Shift+Click) ---
function onCanvasClick(event) {
    if (!event.shiftKey || !neuronPoints) return;
    const rect = renderer.domElement.getBoundingClientRect();
    const mouse = new THREE.Vector2(
        ((event.clientX - rect.left) / rect.width) * 2 - 1,
        -((event.clientY - rect.top) / rect.height) * 2 + 1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.params.Points.threshold = 15;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(neuronPoints);
    if (intersects.length > 0) {
        const idx = intersects[0].index;
        const strength = parseFloat(document.getElementById('touch-str').value);
        send({action: 'touch', idx: idx, strength: strength});
        // Bright flash on touched neuron
        glowDecay[idx] = 2.0;
    }
}

// --- Config: build 3D scene ---
function onConfig(data) {
    nNeurons = data.n_neurons;
    neurons = data.neurons;
    typeColors = data.type_colors;
    typeCounts = data.type_counts;
    electrodes = data.electrodes || {};

    document.getElementById('n-neurons').textContent = nNeurons;
    document.getElementById('n-synapses').textContent = data.n_synapses;

    // EEG history per type
    for (const t of Object.keys(typeColors)) {
        eegHistory[t] = new Float32Array(EEG_LEN);
    }

    // Neuron type legend
    const typesDiv = document.getElementById('types');
    typesDiv.innerHTML = '<div style="font-weight:bold;margin-bottom:4px">Neuron Types</div>';
    const typeLabels = {RS:'Regular Spiking', FS:'Fast Spiking (inh)', IB:'Intrinsic Burst',
                        CH:'Chattering', LTS:'Low-Threshold (inh)'};
    for (const [t, color] of Object.entries(typeColors)) {
        const c = `rgb(${Math.round(color[0]*255)},${Math.round(color[1]*255)},${Math.round(color[2]*255)})`;
        const count = typeCounts[t] || 0;
        const label = typeLabels[t] || t;
        typesDiv.innerHTML += `<div>
            <span class="type-bar" id="bar-${t}" style="background:${c};width:0px"></span>
            <span style="color:${c}">${t}</span>
            <span style="color:#555">${label}</span>
            <span style="color:#666">(${count})</span>
            <span style="color:#888" id="fire-${t}">0</span>
        </div>`;
    }

    buildScene();
}

function buildScene() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    // Center of mass for camera target
    let cx = 0, cy = 0, cz = 0;
    for (const n of neurons) { cx += n.x; cy += n.y; cz += n.z; }
    cx /= nNeurons; cy /= nNeurons; cz /= nNeurons;

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 5000);
    camera.position.set(cx + 400, cy + 300, cz + 400);

    renderer = new THREE.WebGLRenderer({ canvas: document.createElement('canvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.insertBefore(renderer.domElement, document.body.firstChild);
    renderer.domElement.id = 'canvas';

    // Touch handler
    renderer.domElement.addEventListener('click', onCanvasClick);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(cx, cy, cz);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.update();

    // Electrode lookup sets
    const audioSet = new Set(electrodes.audio || []);
    const visualSet = new Set(electrodes.visual || []);
    const motorSet = new Set(electrodes.motor || []);

    // Point cloud
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(nNeurons * 3);
    neuronColors = new Float32Array(nNeurons * 3);
    baseColors = new Float32Array(nNeurons * 3);
    neuronSizes = new Float32Array(nNeurons);
    baseSizeArr = new Float32Array(nNeurons);
    glowDecay = new Float32Array(nNeurons);

    for (let i = 0; i < nNeurons; i++) {
        const n = neurons[i];
        positions[i*3] = n.x;
        positions[i*3+1] = n.y;
        positions[i*3+2] = n.z;

        const c = n.color;
        const dim = n.inh ? 0.4 : 0.5;
        baseColors[i*3] = c[0] * dim;
        baseColors[i*3+1] = c[1] * dim;
        baseColors[i*3+2] = c[2] * dim;
        neuronColors[i*3] = baseColors[i*3];
        neuronColors[i*3+1] = baseColors[i*3+1];
        neuronColors[i*3+2] = baseColors[i*3+2];

        // Electrode neurons slightly bigger so you can see where probes are
        let size = n.inh ? BASE_SIZE * 0.7 : BASE_SIZE;
        if (audioSet.has(i) || visualSet.has(i) || motorSet.has(i)) {
            size = ELECTRODE_SIZE;
        }
        baseSizeArr[i] = size;
        neuronSizes[i] = size;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(neuronColors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(neuronSizes, 1));

    const material = new THREE.ShaderMaterial({
        vertexColors: true,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        vertexShader: `
            attribute float size;
            varying vec3 vColor;
            void main() {
                vColor = color;
                vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * (300.0 / -mvPos.z);
                gl_Position = projectionMatrix * mvPos;
            }
        `,
        fragmentShader: `
            varying vec3 vColor;
            void main() {
                float d = length(gl_PointCoord - 0.5) * 2.0;
                if (d > 1.0) discard;
                float alpha = 1.0 - d * d;
                gl_FragColor = vec4(vColor, alpha * 0.8);
            }
        `,
    });

    neuronPoints = new THREE.Points(geometry, material);
    scene.add(neuronPoints);

    const axisHelper = new THREE.AxesHelper(50);
    axisHelper.position.set(cx - 200, cy - 200, cz - 200);
    scene.add(axisHelper);

    scene.add(new THREE.AmbientLight(0x222222));

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
}

// --- Frame: update glow + I/O displays ---
function onFrame(data) {
    if (!neuronPoints) return;

    document.getElementById('tick').textContent = data.tick;
    document.getElementById('n-fired').textContent = data.n_fired;
    document.getElementById('tonic').textContent = (data.tonic || 2.8).toFixed(1);
    document.getElementById('speed').textContent = (data.speed || 1.0).toFixed(1);

    // Decay glow
    for (let i = 0; i < nNeurons; i++) {
        glowDecay[i] *= GLOW_DECAY;
    }

    // Boost fired neurons
    if (data.fired) {
        for (const fi of data.fired) {
            glowDecay[fi] = GLOW_BOOST;
        }
    }

    // Update colors and sizes
    const colors = neuronPoints.geometry.attributes.color.array;
    const sizes = neuronPoints.geometry.attributes.size.array;
    for (let i = 0; i < nNeurons; i++) {
        const g = glowDecay[i];
        if (g > 0.05) {
            const glow = Math.min(g, 1.0);
            colors[i*3]   = baseColors[i*3]   + (1.0 - baseColors[i*3])   * glow;
            colors[i*3+1] = baseColors[i*3+1] + (0.95 - baseColors[i*3+1]) * glow;
            colors[i*3+2] = baseColors[i*3+2] + (0.6 - baseColors[i*3+2]) * glow * 0.5;
            sizes[i] = baseSizeArr[i] + GLOW_SIZE * glow;
        } else {
            colors[i*3]   = baseColors[i*3];
            colors[i*3+1] = baseColors[i*3+1];
            colors[i*3+2] = baseColors[i*3+2];
            sizes[i] = baseSizeArr[i];
            glowDecay[i] = 0;
        }
    }
    neuronPoints.geometry.attributes.color.needsUpdate = true;
    neuronPoints.geometry.attributes.size.needsUpdate = true;

    // Type bars and EEG
    const typeFire = data.type_fire || {};
    for (const [t, color] of Object.entries(typeColors)) {
        const count = typeFire[t] || 0;
        const total = typeCounts[t] || 1;
        const pct = count / total;
        const barEl = document.getElementById('bar-' + t);
        const fireEl = document.getElementById('fire-' + t);
        if (barEl) barEl.style.width = Math.round(pct * 100) + 'px';
        if (fireEl) fireEl.textContent = count;
        if (eegHistory[t]) {
            eegHistory[t].copyWithin(0, 1);
            eegHistory[t][EEG_LEN - 1] = pct;
        }
    }

    // Motor output (decoded population values)
    drawMotor(data.motor_decoded || data.motor || []);

    drawEEG();
}

// --- Motor output: 8 decoded population channels ---
function drawMotor(motor) {
    const canvas = document.getElementById('motor-canvas');
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    if (!motor.length) return;

    const n = motor.length;
    const barW = w / n;
    const maxVal = Math.max(0.01, ...motor);

    for (let i = 0; i < n; i++) {
        const val = motor[i] / maxVal;
        const barH = val * (h - 4);
        // Orange glow for motor activity
        const r = Math.round(30 + val * 225);
        const g = Math.round(20 + val * 150);
        const b = Math.round(10 + val * 30);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(i * barW + 1, h - barH - 2, barW - 2, barH);
        // Channel label
        ctx.fillStyle = '#666';
        ctx.font = '8px monospace';
        ctx.fillText(i.toString(), i * barW + barW/2 - 3, 10);
    }
}

// --- EEG trace per neuron type ---
function drawEEG() {
    const canvas = document.getElementById('eeg-canvas');
    const ctx = canvas.getContext('2d');
    const w = canvas.width = canvas.parentElement.clientWidth;
    const h = canvas.height = canvas.parentElement.clientHeight;

    ctx.clearRect(0, 0, w, h);
    ctx.globalAlpha = 0.8;

    const typeNames = Object.keys(typeColors);
    const nTypes = typeNames.length;
    const rowH = h / nTypes;

    for (let ri = 0; ri < nTypes; ri++) {
        const t = typeNames[ri];
        const color = typeColors[t];
        const hist = eegHistory[t];
        if (!hist) continue;

        const y0 = ri * rowH;
        ctx.strokeStyle = `rgb(${Math.round(color[0]*255)},${Math.round(color[1]*255)},${Math.round(color[2]*255)})`;
        ctx.lineWidth = 1.2;
        ctx.beginPath();

        for (let i = 0; i < EEG_LEN; i++) {
            const x = (i / EEG_LEN) * w;
            const val = Math.min(hist[i] / 0.3, 1.0);
            const y = y0 + rowH - val * rowH * 0.8 - rowH * 0.1;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        ctx.fillStyle = ctx.strokeStyle;
        ctx.font = '9px monospace';
        ctx.fillText(t, 4, y0 + 10);
    }
}

// --- Render loop ---
function animate() {
    requestAnimationFrame(animate);
    if (controls) controls.update();
    if (renderer && scene && camera) {
        renderer.render(scene, camera);
    }
}

connect();
